<svg xmlns="http://www.w3.org/2000/svg" width="920" height="220" viewBox="0 0 920 220">
  <rect width="920" height="220" fill="#0f172a"/>
  <text x="16" y="24" fill="#e2e8f0" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="bold">Quark hot path (illustrative stack profile)</text>
  <text x="16" y="42" fill="#94a3b8" font-family="Helvetica,Arial,sans-serif" font-size="11">Dominant frames: insert / match / robin_hood — no malloc, no mutex</text>
  <!-- root -->
  <rect x="20" y="170" width="880" height="28" fill="#1d4ed8" rx="2"/>
  <text x="28" y="189" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="12">me_bench (100%)</text>
  <!-- insert -->
  <rect x="20" y="130" width="620" height="28" fill="#0369a1" rx="2"/>
  <text x="28" y="149" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="12">OrderBook::insert (62%)</text>
  <!-- match -->
  <rect x="650" y="130" width="250" height="28" fill="#0f766e" rx="2"/>
  <text x="658" y="149" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="12">match (28%)</text>
  <!-- children of insert -->
  <rect x="20" y="90" width="220" height="28" fill="#15803d" rx="2"/>
  <text x="28" y="109" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11">RobinHood::insert (22%)</text>
  <rect x="250" y="90" width="200" height="28" fill="#16a34a" rx="2"/>
  <text x="258" y="109" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11">rest_order / level (20%)</text>
  <rect x="460" y="90" width="180" height="28" fill="#4d7c0f" rx="2"/>
  <text x="468" y="109" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11">pool allocate (18%)</text>
  <!-- cancel thin -->
  <rect x="650" y="90" width="120" height="28" fill="#a16207" rx="2"/>
  <text x="658" y="109" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11">cancel (8%)</text>
  <rect x="780" y="90" width="120" height="28" fill="#b45309" rx="2"/>
  <text x="788" y="109" fill="white" font-family="Helvetica,Arial,sans-serif" font-size="11">other (2%)</text>
  <!-- leaf note -->
  <rect x="20" y="50" width="880" height="28" fill="#334155" rx="2"/>
  <text x="28" y="69" fill="#f8fafc" font-family="Helvetica,Arial,sans-serif" font-size="11">malloc / free / pthread_mutex_* : 0% on hot path (by design)</text>
</svg>
